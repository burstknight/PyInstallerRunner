[project]
name = "PyInsterallerRunner"
dynamic = ["version"]
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "burstknight", email = "burstknight@gmail.com" }
]
requires-python = ">=3.8"
dependencies = []

[project.scripts]
PyInsterallerRunner = "PyInsterallerRunner.myPyInstallerRunner:main"

[tool.hatch.version]
path = "./src/PyInstallerRunner/version.py"

[tool.hatch.build.targets.wheel]
packages = [
	"src/PyInsterallerRunner"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
