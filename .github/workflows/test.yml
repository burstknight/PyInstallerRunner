name: Test PyInstallerRunner

on:
  push:
    branches:
      - master

jobs:
  build:
      name: Test PyInstallerRunner
      runs-on: ${{ matrix.os }}
      strategy:
        matrix:
          os: [ubuntu-latest, windows-latest]
          python-version:
            - "3.8"
            - "3.9"
            - "3.10"
            - "3.11"
            - "3.12"
            - "3.14"
      env:
        UV_PYTHON: ${{ matrix.python-version }}
      steps:
        - uses: actions/checkout@v6

        - name: Install uv
          uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

        - name: Install the project
          run: uv sync

        - name: Run tests
          run: uv run pytest

